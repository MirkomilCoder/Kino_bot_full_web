{% extends "base.html" %}
{% block content %}

<section class="center-wrap">
    <div class="panel narrow" style="text-align: center;">
        <h1>📲 Telegram tekshiruv</h1>
        <p class="muted" style="margin-top: 8px;">Mini App sessiyasi tekshirilmoqda...</p>

        <form id="tgAuthForm" method="post" action="/admin/tg-auth/complete" style="display: none;">
            <input type="hidden" name="uid" value="{{ auth_uid }}">
            <input type="hidden" name="role" value="{{ auth_role }}">
            <input type="hidden" name="exp" value="{{ auth_exp }}">
            <input type="hidden" name="sig" value="{{ auth_sig }}">
            <input type="hidden" name="init_data" id="init_data" value="">
        </form>

        <div id="tgAuthStatus" class="status warn" style="display: inline-flex; margin-top: 12px;">
            ⏳ Telegram WebApp ma'lumoti olinmoqda...
        </div>

        <div class="muted" style="margin-top: 14px;">
            Agar bu sahifani Telegramdan tashqarida ochsangiz, kirish bloklanadi.
        </div>
    </div>
</section>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
    (() => {
        const statusEl = document.getElementById("tgAuthStatus");
        const form = document.getElementById("tgAuthForm");
        const initInput = document.getElementById("init_data");

        const fail = (text) => {
            if (statusEl) {
                statusEl.classList.remove("warn", "info");
                statusEl.classList.add("bad");
                statusEl.textContent = text;
            }
        };

        try {
            const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
            if (!tg) {
                fail("❌ Telegram WebApp topilmadi. Faqat Telegram ichidan oching.");
                return;
            }

            tg.ready();
            const initData = (tg.initData || "").trim();
            if (!initData) {
                fail("❌ Telegram initData bo'sh. Qayta /webapp tugmasi orqali oching.");
                return;
            }

            initInput.value = initData;
            if (statusEl) {
                statusEl.classList.remove("warn");
                statusEl.classList.add("info");
                statusEl.textContent = "✅ Tekshirildi, kirilmoqda...";
            }
            form.submit();
        } catch (e) {
            fail("❌ Telegram tekshiruvida xatolik yuz berdi.");
        }
    })();
</script>

{% endblock %}
